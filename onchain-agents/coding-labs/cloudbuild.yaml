# Cloud Build pipeline for Cloud Run deployment
# Trigger: make cloud-deploy (manual)
#
# Deployment order:
#   1. Build all images (parallel)
#   2. Push all images
#   3. Deploy Midnight infrastructure (node, indexer, proof-server) - parallel
#   4. Deploy agent-registry (no dependencies)
#   5. Deploy midnight-mcp (depends on Midnight infrastructure URLs)
#   6. Deploy somnia-agent (with AGENT_REGISTRY_URL)
#   7. Deploy midnight-agent (with AGENT_REGISTRY_URL + MIDNIGHT_MCP_URL)
#   8. Deploy opencode-login (public landing page)
#   9. Deploy opencode-web (with all agent URLs + LOGIN_PAGE_URL, IAP protected)
#
# Services:
#   - midnight-node, midnight-indexer, midnight-proof-server: Public (Midnight infra)
#   - agent-registry, somnia-agent, midnight-agent, midnight-mcp: Public (no auth)
#   - opencode-login: Public (landing page)
#   - opencode-web: IAP protected (requires Google sign-in)
#
# Midnight Infrastructure Versions:
#   - Node: 0.20.1
#   - Indexer: 3.0.0
#   - Proof Server: 7.0.0-rc.1

steps:
  # ===========================================================================
  # BUILD ALL IMAGES (parallel)
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-registry'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agent-registry:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agent-registry:latest'
      - '-f'
      - 'packages/agent-registry/Containerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-somnia'
    waitFor: ['-'] # Start immediately (parallel with build-registry)
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/somnia-agent:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/somnia-agent:latest'
      - '-f'
      - 'packages/somnia-agent/Containerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-sonic'
    waitFor: ['-'] # Start immediately (parallel with others)
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/sonic-agent:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/sonic-agent:latest'
      - '-f'
      - 'packages/sonic-agent/Containerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-midnight'
    waitFor: ['-'] # Start immediately (parallel with others)
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-agent:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-agent:latest'
      - '-f'
      - 'packages/midnight-agent/Containerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-opencode'
    waitFor: ['-'] # Start immediately (parallel with others)
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-web:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-web:latest'
      - '-f'
      - 'opencode/Containerfile.web'
      - './opencode'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-midnight-mcp'
    waitFor: ['-'] # Start immediately (parallel with others)
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-mcp:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-mcp:latest'
      - '-f'
      - 'packages/midnight-mcp/Containerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-login'
    waitFor: ['-'] # Start immediately (parallel with others)
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-login:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-login:latest'
      - '-f'
      - 'packages/opencode-login/Containerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-evm-mcp'
    waitFor: ['-'] # Start immediately (parallel with others)
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/evm-mcp:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/evm-mcp:latest'
      - '-f'
      - 'packages/evm-mcp/Containerfile'
      - '.'

  # ===========================================================================
  # PUSH ALL IMAGES
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-registry'
    waitFor: ['build-registry']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agent-registry'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-somnia'
    waitFor: ['build-somnia']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/somnia-agent'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-sonic'
    waitFor: ['build-sonic']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/sonic-agent'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-midnight'
    waitFor: ['build-midnight']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-agent'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-opencode'
    waitFor: ['build-opencode']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-web'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-midnight-mcp'
    waitFor: ['build-midnight-mcp']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-mcp'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-login'
    waitFor: ['build-login']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-login'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-evm-mcp'
    waitFor: ['build-evm-mcp']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/evm-mcp'

  # ===========================================================================
  # DEPLOY MIDNIGHT INFRASTRUCTURE (parallel - no dependencies)
  # ===========================================================================
  # These use pre-built images from Docker Hub, no build/push needed.
  # All 3 services can be deployed in parallel since they have no dependencies.

  # Midnight Node - Standalone blockchain node
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-midnight-node'
    waitFor: ['-'] # Start immediately
    args:
      - 'run'
      - 'deploy'
      - 'midnight-node'
      - '--image=docker.io/midnightntwrk/midnight-node:0.20.1'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--ingress=all'
      - '--port=9944'
      - '--memory=8Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--set-env-vars=CFG_PRESET=dev'
      - '--timeout=600'

  # Get midnight-node URL
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-midnight-node-url'
    waitFor: ['deploy-midnight-node']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe midnight-node \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/midnight-node-url.txt
        echo "Midnight Node URL: $$(cat /workspace/midnight-node-url.txt)"

  # Midnight Indexer - Blockchain indexer (depends on node URL)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-midnight-indexer'
    waitFor: ['get-midnight-node-url']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        NODE_URL=$$(cat /workspace/midnight-node-url.txt)
        # Convert HTTPS URL to WSS for WebSocket connection
        NODE_WS_URL=$$(echo "$${NODE_URL}" | sed 's|https://|wss://|')
        gcloud run deploy midnight-indexer \
          --image=docker.io/midnightntwrk/indexer-standalone:3.0.0 \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --ingress=all \
          --port=8088 \
          --memory=8Gi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=1 \
          --timeout=600 \
          --set-env-vars="APP__INFRA__NODE__URL=$${NODE_WS_URL},APP__INFRA__SECRET=303132333435363738393031323334353637383930313233343536373839303132"

  # Get midnight-indexer URL
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-midnight-indexer-url'
    waitFor: ['deploy-midnight-indexer']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe midnight-indexer \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/midnight-indexer-url.txt
        echo "Midnight Indexer URL: $$(cat /workspace/midnight-indexer-url.txt)"

  # Midnight Proof Server - ZK proof generation (no dependencies)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-midnight-proof-server'
    waitFor: ['-'] # Start immediately (parallel with node)
    args:
      - 'run'
      - 'deploy'
      - 'midnight-proof-server'
      - '--image=docker.io/midnightnetwork/proof-server:7.0.0-rc.1'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--ingress=all'
      - '--port=6300'
      - '--memory=8Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--timeout=600'

  # Get midnight-proof-server URL
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-midnight-proof-server-url'
    waitFor: ['deploy-midnight-proof-server']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe midnight-proof-server \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/midnight-proof-server-url.txt
        echo "Midnight Proof Server URL: $$(cat /workspace/midnight-proof-server-url.txt)"

  # ===========================================================================
  # DEPLOY 1: agent-registry (no dependencies)
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-registry'
    waitFor: ['push-registry']
    args:
      - 'run'
      - 'deploy'
      - 'agent-registry'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agent-registry:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--ingress=all'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--set-env-vars=NODE_ENV=production'

  # ===========================================================================
  # GET agent-registry URL
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-registry-url'
    waitFor: ['deploy-registry']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe agent-registry \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/registry-url.txt
        echo "Registry URL: $$(cat /workspace/registry-url.txt)"

  # ===========================================================================
  # DEPLOY 2: midnight-mcp (depends on Midnight infrastructure)
  # ===========================================================================
  # MCP server for Midnight tools (Compact compiler, Indexer queries, Proof Server).
  # Connects to our Cloud Run Midnight infrastructure services.

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-midnight-mcp'
    waitFor:
      [
        'push-midnight-mcp',
        'get-midnight-node-url',
        'get-midnight-indexer-url',
        'get-midnight-proof-server-url',
      ]
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        NODE_URL=$$(cat /workspace/midnight-node-url.txt)
        INDEXER_URL=$$(cat /workspace/midnight-indexer-url.txt)
        PROOF_URL=$$(cat /workspace/midnight-proof-server-url.txt)
        # Convert HTTPS to WSS for node RPC
        NODE_WS_URL=$$(echo "$${NODE_URL}" | sed 's|https://|wss://|')
        gcloud run deploy midnight-mcp \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-mcp:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --ingress=all \
          --port=8080 \
          --memory=8Gi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=3 \
          --timeout=600 \
          --set-env-vars="NODE_ENV=production,MIDNIGHT_DEFAULT_NETWORK=local,MIDNIGHT_NODE_RPC=$${NODE_WS_URL},MIDNIGHT_INDEXER_URL=$${INDEXER_URL}/api/v1/graphql,MIDNIGHT_PROOF_SERVER_URL=$${PROOF_URL}"

  # ===========================================================================
  # GET midnight-mcp URL
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-midnight-mcp-url'
    waitFor: ['deploy-midnight-mcp']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe midnight-mcp \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/midnight-mcp-url.txt
        echo "Midnight MCP URL: $$(cat /workspace/midnight-mcp-url.txt)"

  # ===========================================================================
  # DEPLOY: evm-mcp (no dependencies - includes Foundry/Anvil)
  # ===========================================================================
  # MCP server for EVM tools (Forge compile, Cast call/send, Anvil fork).
  # Shared by all EVM chain agents (sonic-agent, somnia-agent, etc.)

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-evm-mcp'
    waitFor: ['push-evm-mcp']
    args:
      - 'run'
      - 'deploy'
      - 'evm-mcp'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/evm-mcp:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--ingress=all'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production,EVM_MCP_HOST=0.0.0.0,EVM_MCP_PORT=8080,ANVIL_PORT=8545,DEFAULT_SOLC_VERSION=0.8.28'
      - '--timeout=600'

  # ===========================================================================
  # GET evm-mcp URL
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-evm-mcp-url'
    waitFor: ['deploy-evm-mcp']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe evm-mcp \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/evm-mcp-url.txt
        echo "EVM MCP URL: $$(cat /workspace/evm-mcp-url.txt)"

  # ===========================================================================
  # DEPLOY 3: somnia-agent (depends on agent-registry)
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-somnia'
    waitFor: ['get-registry-url', 'push-somnia']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        REGISTRY_URL=$$(cat /workspace/registry-url.txt)
        gcloud run deploy somnia-agent \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/somnia-agent:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --ingress=all \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars="NODE_ENV=production,AGENT_REGISTRY_URL=$${REGISTRY_URL}"

  # ===========================================================================
  # GET somnia-agent URL
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-somnia-url'
    waitFor: ['deploy-somnia']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe somnia-agent \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/somnia-url.txt
        echo "Somnia URL: $$(cat /workspace/somnia-url.txt)"

  # ===========================================================================
  # DEPLOY 4: sonic-agent (depends on agent-registry + evm-mcp)
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-sonic'
    waitFor: ['get-registry-url', 'get-evm-mcp-url', 'push-sonic']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        REGISTRY_URL=$$(cat /workspace/registry-url.txt)
        EVM_MCP_URL=$$(cat /workspace/evm-mcp-url.txt)
        gcloud run deploy sonic-agent \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/sonic-agent:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --ingress=all \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars="NODE_ENV=production,AGENT_REGISTRY_URL=$${REGISTRY_URL},EVM_MCP_URL=$${EVM_MCP_URL}"

  # ===========================================================================
  # GET sonic-agent URL
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-sonic-url'
    waitFor: ['deploy-sonic']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe sonic-agent \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/sonic-url.txt
        echo "Sonic URL: $$(cat /workspace/sonic-url.txt)"

  # ===========================================================================
  # DEPLOY 5: midnight-agent (depends on agent-registry + midnight-mcp)
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-midnight'
    waitFor: ['get-registry-url', 'get-midnight-mcp-url', 'push-midnight']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        REGISTRY_URL=$$(cat /workspace/registry-url.txt)
        MCP_URL=$$(cat /workspace/midnight-mcp-url.txt)
        gcloud run deploy midnight-agent \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/midnight-agent:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --ingress=all \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars="NODE_ENV=production,AGENT_REGISTRY_URL=$${REGISTRY_URL},MIDNIGHT_MCP_URL=$${MCP_URL}"

  # ===========================================================================
  # GET midnight-agent URL
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-midnight-url'
    waitFor: ['deploy-midnight']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe midnight-agent \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/midnight-url.txt
        echo "Midnight URL: $$(cat /workspace/midnight-url.txt)"

  # ===========================================================================
  # DEPLOY 5: opencode-login (public landing page)
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-login'
    waitFor: ['push-login']
    args:
      - 'run'
      - 'deploy'
      - 'opencode-login'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-login:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--ingress=all'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--set-env-vars=NODE_ENV=production'

  # ===========================================================================
  # GET opencode-login URL
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-login-url'
    waitFor: ['deploy-login']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe opencode-login \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/login-url.txt
        echo "Login URL: $$(cat /workspace/login-url.txt)"

  # ===========================================================================
  # DEPLOY 6: opencode-web (depends on all agents + login page, IAP protected)
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-opencode'
    waitFor:
      [
        'get-somnia-url',
        'get-sonic-url',
        'get-midnight-url',
        'get-login-url',
        'push-opencode',
      ]
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        REGISTRY_URL=$$(cat /workspace/registry-url.txt)
        SOMNIA_URL=$$(cat /workspace/somnia-url.txt)
        SONIC_URL=$$(cat /workspace/sonic-url.txt)
        MIDNIGHT_URL=$$(cat /workspace/midnight-url.txt)
        LOGIN_URL=$$(cat /workspace/login-url.txt)
        gcloud beta run deploy opencode-web \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/opencode-web:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --iap \
          --ingress=all \
          --port=8080 \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --set-env-vars="NODE_ENV=production,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=global,AGENT_REGISTRY_URL=$${REGISTRY_URL},SOMNIA_AGENT_URL=$${SOMNIA_URL},SONIC_AGENT_URL=$${SONIC_URL},MIDNIGHT_AGENT_URL=$${MIDNIGHT_URL},LOGIN_PAGE_URL=$${LOGIN_URL}"

  # ===========================================================================
  # SETUP IAP: Grant IAP service agent run.invoker role
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'setup-iap'
    waitFor: ['deploy-opencode']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Get project number
        PROJECT_NUMBER=$$(gcloud projects describe ${PROJECT_ID} --format='value(projectNumber)')

        # Grant IAP service agent the invoker role on opencode-web
        gcloud run services add-iam-policy-binding opencode-web \
          --region=${_REGION} \
          --member="serviceAccount:service-$${PROJECT_NUMBER}@gcp-sa-iap.iam.gserviceaccount.com" \
          --role=roles/run.invoker \
          --quiet 2>/dev/null || true

        echo "IAP service agent granted run.invoker role"

  # ===========================================================================
  # UPDATE agent-registry with agent URLs
  # ===========================================================================
  # The registry needs to know the actual Cloud Run URLs for agents.
  # We redeploy with SOMNIA_AGENT_URL so the config resolver uses it.

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'update-registry'
    waitFor: ['get-somnia-url', 'get-sonic-url', 'get-midnight-url']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SOMNIA_URL=$$(cat /workspace/somnia-url.txt)
        SONIC_URL=$$(cat /workspace/sonic-url.txt)
        MIDNIGHT_URL=$$(cat /workspace/midnight-url.txt)
        gcloud run services update agent-registry \
          --region=${_REGION} \
          --update-env-vars="SOMNIA_AGENT_URL=$${SOMNIA_URL},SONIC_AGENT_URL=$${SONIC_URL},MIDNIGHT_AGENT_URL=$${MIDNIGHT_URL}"

  # ===========================================================================
  # UPDATE opencode-login with APP_URL (opencode-web URL)
  # ===========================================================================
  # The login page needs to know the main app URL for the "Sign in" button.

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'update-login'
    waitFor: ['deploy-opencode', 'deploy-login']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        OPENCODE_URL=$$(gcloud run services describe opencode-web --region=${_REGION} --format='value(status.url)')
        gcloud run services update opencode-login \
          --region=${_REGION} \
          --update-env-vars="APP_URL=$${OPENCODE_URL}"
        echo "Updated opencode-login with APP_URL=$${OPENCODE_URL}"

  # ===========================================================================
  # PRINT FINAL URLs
  # ===========================================================================

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'print-urls'
    waitFor: ['deploy-opencode', 'update-registry', 'update-login']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo ""
        echo "=========================================="
        echo "Deployment Complete!"
        echo "=========================================="
        echo ""
        echo "Midnight Infrastructure:"
        echo "  midnight-node:         $$(cat /workspace/midnight-node-url.txt)"
        echo "  midnight-indexer:      $$(cat /workspace/midnight-indexer-url.txt)"
        echo "  midnight-proof-server: $$(cat /workspace/midnight-proof-server-url.txt)"
        echo ""
        echo "Application Services:"
        echo "  agent-registry:  $$(cat /workspace/registry-url.txt)"
        echo "  somnia-agent:    $$(cat /workspace/somnia-url.txt)"
        echo "  sonic-agent:     $$(cat /workspace/sonic-url.txt)"
        echo "  midnight-agent:  $$(cat /workspace/midnight-url.txt)"
        echo "  midnight-mcp:    $$(cat /workspace/midnight-mcp-url.txt)"
        echo "  evm-mcp:         $$(cat /workspace/evm-mcp-url.txt)"
        echo "  opencode-login:  $$(cat /workspace/login-url.txt) (public landing page)"
        OPENCODE_URL=$$(gcloud run services describe opencode-web --region=${_REGION} --format='value(status.url)')
        echo "  opencode-web:    $${OPENCODE_URL} (IAP protected)"
        echo ""
        echo "Access the application via the login page: $$(cat /workspace/login-url.txt)"
        echo ""

substitutions:
  _REGION: us-central1
  _REPO: coding-labs
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
