# Coding Labs - Local Development
# Usage: podman-compose up -d
# Or: docker compose up -d

services:
  somnia-agent:
    build:
      context: .
      dockerfile: packages/somnia-agent/Containerfile
    container_name: somnia-agent
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - SOMNIA_AGENT_PORT=4001
      - SOMNIA_AGENT_HOST=0.0.0.0
      - GOOGLE_CLOUD_PROJECT=kunal-scratch
      - GOOGLE_CLOUD_LOCATION=global
      # For local dev with gcloud auth
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/application_default_credentials.json
    volumes:
      # Mount gcloud credentials for Vertex AI
      - ${HOME}/.config/gcloud:/creds:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

