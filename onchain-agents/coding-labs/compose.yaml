# Coding Labs - Local Development
# ================================
# Prerequisites:
#   1. Generate environment file: bun scripts/generate-env.ts
#   2. Ensure GCloud credentials are available
#
# Usage:
#   podman-compose up -d
#   docker compose up -d
#
# This starts the full stack including Midnight infrastructure (node, indexer, proof-server).
# All services run by default - no profiles needed for local development.
#
# With login page (optional):
#   docker compose --profile login up -d

# ---------------------------------------------------------------------------
# Midnight Versions - Keep all in sync when upgrading
# ---------------------------------------------------------------------------
# NODE_VERSION=0.20.1 (node, toolkit)
# INDEXER_VERSION=3.0.0 (separate versioning)
# PROOF_SERVER_VERSION=7.0.0-rc.1
# See: https://docs.midnight.network/next/relnotes/overview#compatibility-matrix

services:
  # ---------------------------------------------------------------------------
  # Midnight Infrastructure (always runs)
  # ---------------------------------------------------------------------------
  # These services provide the local Midnight blockchain for development.
  # No external network dependencies - fully isolated.

  # Midnight Node - Standalone dev node (isolated private chain)
  # The CFG_PRESET=dev flag runs the node without connecting to any external network.
  # Tokens are genesis-minted -- no faucet needed.
  midnight-node:
    image: midnightntwrk/midnight-node:0.20.1
    container_name: midnight-node
    ports:
      - '9944:9944'
    environment:
      CFG_PRESET: dev
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # Midnight Indexer - Standalone indexer (chain + wallet + API in one)
  # Watches the local node and provides GraphQL API for state queries.
  # NOTE: No healthcheck - image doesn't have curl/wget
  midnight-indexer:
    image: midnightntwrk/indexer-standalone:3.0.0
    container_name: midnight-indexer
    ports:
      - '8088:8088'
    environment:
      RUST_LOG: 'indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=info,info'
      APP__INFRA__SECRET: '303132333435363738393031323334353637383930313233343536373839303132'
      APP__INFRA__NODE__URL: 'ws://midnight-node:9944'
    depends_on:
      - midnight-node
    restart: unless-stopped

  # Midnight Proof Server - ZK proof generation
  # NOTE: No healthcheck - image doesn't have curl/wget
  midnight-proof-server:
    image: midnightnetwork/proof-server:7.0.0-rc.1
    container_name: midnight-proof-server
    ports:
      - '6300:6300'
    environment:
      # Proof server uses $PORT env var
      PORT: '6300'
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Midnight MCP - MCP server for Midnight Network tools
  # ---------------------------------------------------------------------------
  # Provides: Compact compiler, contract deploy/call, state queries
  # Transport: SSE over HTTP
  # Connects to local infrastructure containers by default.
  midnight-mcp:
    build:
      context: .
      dockerfile: packages/midnight-mcp/Containerfile
    container_name: midnight-mcp
    ports:
      - '${MIDNIGHT_MCP_PORT:-4010}:8080'
    env_file:
      - .env.generated
    environment:
      - NODE_ENV=development
      - MIDNIGHT_MCP_HOST=0.0.0.0
      - MIDNIGHT_MCP_PORT=8080
      # Default to local network (container URLs)
      - MIDNIGHT_DEFAULT_NETWORK=local
      # Container URLs for local infrastructure
      - MIDNIGHT_NODE_RPC=ws://midnight-node:9944
      - MIDNIGHT_INDEXER_URL=http://midnight-indexer:8088/api/v1/graphql
      - MIDNIGHT_INDEXER_WS=ws://midnight-indexer:8088/api/v1/graphql/ws
      - MIDNIGHT_PROOF_SERVER_URL=http://midnight-proof-server:6300
    depends_on:
      - midnight-node
      - midnight-indexer
      - midnight-proof-server
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:8080/health'',r=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Agent Registry - Central directory of all agents
  # ---------------------------------------------------------------------------
  agent-registry:
    build:
      context: .
      dockerfile: packages/agent-registry/Containerfile
    container_name: agent-registry
    ports:
      - '${AGENT_REGISTRY_PORT:-4000}:${AGENT_REGISTRY_PORT:-4000}'
    env_file:
      - .env.generated
    environment:
      - NODE_ENV=development
      - AGENT_REGISTRY_HOST=0.0.0.0
      # Override agent URLs for container networking
      - SOMNIA_AGENT_URL=http://somnia-agent:4001
      - SONIC_AGENT_URL=http://sonic-agent:4002
      - MIDNIGHT_AGENT_URL=http://midnight-agent:4003
    volumes:
      # Mount config.toml for the registry to read
      - ./config.toml:/app/config.toml:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:4000/health'',r=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Somnia Agent - A2A server for Somnia blockchain
  # ---------------------------------------------------------------------------
  somnia-agent:
    build:
      context: .
      dockerfile: packages/somnia-agent/Containerfile
    container_name: somnia-agent
    ports:
      - '${SOMNIA_AGENT_PORT:-4001}:${SOMNIA_AGENT_PORT:-4001}'
    env_file:
      - .env.generated
    environment:
      - NODE_ENV=development
      - SOMNIA_AGENT_HOST=0.0.0.0
      # For local dev with gcloud auth
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/application_default_credentials.json
    volumes:
      # Mount gcloud credentials for Vertex AI
      - ${HOME}/.config/gcloud:/creds:ro
      # Mount config.toml (optional, env vars take precedence)
      - ./config.toml:/app/config.toml:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:4001/health'',r=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Midnight Agent - A2A server for Midnight Network (ZK blockchain)
  # ---------------------------------------------------------------------------
  # NOTE: midnight-agent calls MCP tools via HTTP, so midnight-mcp must be running.
  midnight-agent:
    build:
      context: .
      dockerfile: packages/midnight-agent/Containerfile
    container_name: midnight-agent
    ports:
      - '${MIDNIGHT_AGENT_PORT:-4003}:${MIDNIGHT_AGENT_PORT:-4003}'
    env_file:
      - .env.generated
    environment:
      - NODE_ENV=development
      - MIDNIGHT_AGENT_HOST=0.0.0.0
      # MCP server URL for tool calls (compile, deploy, call, query)
      - MIDNIGHT_MCP_URL=http://midnight-mcp:8080
      # For local dev with gcloud auth
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/application_default_credentials.json
    depends_on:
      midnight-mcp:
        condition: service_healthy
    volumes:
      # Mount gcloud credentials for Vertex AI
      - ${HOME}/.config/gcloud:/creds:ro
      # Mount config.toml (optional, env vars take precedence)
      - ./config.toml:/app/config.toml:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:4003/health'',r=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenCode Web - Frontend + Backend with wallet connection and A2A routing
  # ---------------------------------------------------------------------------
  # Runs both the OpenCode server (with A2A plugin) and serves the static frontend.
  # In local dev, these are separate (Vite dev server + opencode web), but in
  # containers they're combined via `opencode serve` with OPENCODE_STATIC_DIR.
  opencode-web:
    build:
      context: ./opencode
      dockerfile: Containerfile.web
    container_name: opencode-web
    ports:
      # Container runs on 8080 (set in Containerfile.web), map to host port 3000
      - '${OPENCODE_FRONTEND_PORT:-3000}:8080'
    env_file:
      - .env.generated
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=8080
      # Agent Registry URL for A2A plugin
      - AGENT_REGISTRY_URL=http://agent-registry:4000
      # GCloud credentials for Vertex AI
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/application_default_credentials.json
      # LLM config comes from .env.generated (GOOGLE_CLOUD_PROJECT, VERTEX_LOCATION)
      # which is generated from config.toml [default.llm.components.opencode]
    volumes:
      # Mount gcloud credentials for Vertex AI
      - ${HOME}/.config/gcloud:/creds:ro
    depends_on:
      - agent-registry
      - somnia-agent
      - midnight-agent
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8080/global/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenCode Login - Landing page with "Sign in with Google" (optional)
  # ---------------------------------------------------------------------------
  # Only starts when using --profile login
  # In production, this is a separate Cloud Run service (public, no IAP)
  opencode-login:
    build:
      context: .
      dockerfile: packages/opencode-login/Containerfile
    container_name: opencode-login
    profiles:
      - login
    ports:
      - '${OPENCODE_LOGIN_PORT:-4098}:8080'
    environment:
      - NODE_ENV=development
      - PORT=8080
      # URL of the main app (for "Sign in with Google" button)
      - APP_URL=http://localhost:${OPENCODE_FRONTEND_PORT:-3000}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

# ===========================================================================
# Service Dependency Graph
# ===========================================================================
#
#   midnight-node ──┬──> midnight-indexer ──┐
#                   │                       │
#                   └──> midnight-proof-server
#                                           │
#                                           ▼
#                                    midnight-mcp
#                                           │
#                                           ▼
#                                    midnight-agent
#                                           │
#   somnia-agent ◄──────────────────────────┤
#                                           │
#   agent-registry ◄────────────────────────┤
#                                           │
#                                           ▼
#                                     opencode-web
#
# ===========================================================================
# Local Development (without containers)
# ===========================================================================
# Terminal 1: make run   (starts all services with concurrently)
#
# Or individually:
#   make registry-dev     (Agent Registry on :4000)
#   make dev              (Somnia Agent on :4001)
#   make opencode-server  (OpenCode Backend on :4097)
#
# Service URLs (containers):
#   Node RPC:    ws://localhost:9944
#   Indexer:     http://localhost:8088
#   Proof:       http://localhost:6300
#   MCP:         http://localhost:4010
#   Registry:    http://localhost:4000
#   Somnia:      http://localhost:4001
#   Midnight:    http://localhost:4003
#   OpenCode:    http://localhost:3000
#
# With login page:
#   docker compose --profile login up -d
#   Login page: http://localhost:4098
