# Coding Labs - Master Configuration
# ===================================
# This is the single source of truth for all service configurations.
#
# Resolution order (later wins):
#   1. [default.*] sections (base configuration)
#   2. [<env>.*] sections (environment-specific overrides)
#   3. Environment variables (container/cloud overrides)
#
# Environment variable naming convention:
#   service "somnia-agent" → SOMNIA_AGENT_HOST, SOMNIA_AGENT_PORT, SOMNIA_AGENT_URL
#   service "agent-registry" → AGENT_REGISTRY_HOST, AGENT_REGISTRY_PORT, AGENT_REGISTRY_URL

[meta]
version = "1.0"
updated = "2026-02-12"

# =============================================================================
# DEFAULTS
# =============================================================================

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------

[default.services.agent-registry]
host = "localhost"
port = 4000

[default.services.somnia-agent]
host = "localhost"
port = 4001

[default.services.sonic-agent]
host = "localhost"
port = 4002

[default.services.midnight-agent]
host = "localhost"
port = 4003

[default.services.midnight-mcp]
host = "localhost"
port = 4010

[default.services.evm-mcp]
host = "localhost"
port = 4011

[default.services.opencode-server]
host = "localhost"
port = 4097

[default.services.opencode-frontend]
host = "localhost"
port = 3000

# -----------------------------------------------------------------------------
# Agents (registered in agent-registry)
# -----------------------------------------------------------------------------
# Each agent references a service for URL construction.
# Explicit 'url' overrides the constructed URL (for containers/cloud).

[default.agents.somnia]
name = "Somnia Agent"
description = "High-performance EVM L1 with 1M+ TPS. Generates and deploys Solidity contracts."
service = "somnia-agent"
chain_id = 50312
keywords = ["somnia", "solidity", "erc20", "erc721", "nft", "token", "deploy", "contract", "evm"]
enabled = true

[default.agents.sonic]
name = "Sonic Agent"
description = "High-performance EVM chain with FeeM (Fee Monetization). Earn 90% of gas fees!"
service = "sonic-agent"
chain_id = 146
keywords = ["sonic", "ftm", "fantom", "feem", "fee monetization", "s token"]
enabled = true

[default.agents.midnight]
name = "Midnight Agent"
description = "Privacy-preserving blockchain with zero-knowledge proofs and Compact language."
service = "midnight-agent"
chain_id = 0
keywords = ["midnight", "privacy", "zk", "zero-knowledge", "compact", "confidential"]
enabled = true

# -----------------------------------------------------------------------------
# Networks (blockchain configurations)
# -----------------------------------------------------------------------------

[default.networks.somnia-mainnet]
chain_id = 5031
name = "Somnia Mainnet"
rpc_url = "https://api.infra.mainnet.somnia.network/"
explorer_url = "https://explorer.somnia.network"

[default.networks.somnia-mainnet.native_currency]
name = "SOMI"
symbol = "SOMI"
decimals = 18

[default.networks.somnia-testnet]
chain_id = 50312
name = "Somnia Testnet (Shannon)"
rpc_url = "https://dream-rpc.somnia.network/"
explorer_url = "https://shannon-explorer.somnia.network"

[default.networks.somnia-testnet.native_currency]
name = "STT"
symbol = "STT"
decimals = 18

[default.networks.sonic-mainnet]
chain_id = 146
name = "Sonic Mainnet"
rpc_url = "https://rpc.soniclabs.com"
explorer_url = "https://sonicscan.org"

[default.networks.sonic-mainnet.native_currency]
name = "Sonic"
symbol = "S"
decimals = 18

# Midnight Networks (Preview, Preprod, and Local environments)
# Note: Midnight uses different infrastructure than EVM chains
[default.networks.midnight-preview]
name = "Midnight Preview"
node_rpc = "https://rpc.preview.midnight.network"
indexer_graphql = "https://indexer.preview.midnight.network/api/v3/graphql"
proof_server = "https://lace-proof-pub.preview.midnight.network"
faucet = "https://faucet.preview.midnight.network/"
explorer = "https://explorer.preview.midnight.network/"

[default.networks.midnight-preprod]
name = "Midnight Preprod"
node_rpc = "https://rpc.preprod.midnight.network"
indexer_graphql = "https://indexer.preprod.midnight.network/api/v3/graphql"
proof_server = "https://lace-proof-pub.preprod.midnight.network"
faucet = "https://faucet.preprod.midnight.network/"
explorer = "https://explorer.preprod.midnight.network/"

# Local standalone devnet (docker compose --profile midnight-local up -d)
# CFG_PRESET=dev on the node runs an isolated chain with genesis-minted tokens.
# No faucet needed, no Cardano dependency, no external network connection.
[default.networks.midnight-local]
name = "Midnight Local (Standalone)"
node_rpc = "ws://localhost:9944"
indexer_graphql = "http://localhost:8088"
proof_server = "http://localhost:6300"

# Midnight version compatibility (v1.0)
# Source: https://docs.midnight.network/next/relnotes/overview#compatibility-matrix
#
# IMPORTANT: Node and toolkit are released together with matching versions.
# The 'version' field is the single source of truth for both.
[default.midnight]
# Single version for node + toolkit (they are versioned together)
version = "0.20.1"

# Component versions (for reference/validation)
compact_compiler = "0.28.0"
compact_language = "0.21"
compact_runtime = "0.14.0"
midnight_js = "3.0.0"
ledger = "7.0.0"
proof_server = "7.0.0"
indexer = "3.0.0"

# -----------------------------------------------------------------------------
# LLM Configuration
# -----------------------------------------------------------------------------
# Define reusable LLM providers, then assign them to components.
# Components not listed fall back to the default provider.

# Default provider for components not explicitly assigned
[default.llm]
default = "vertex-gemini"

# Available providers
[default.llm.providers.vertex-gemini]
type = "vertex"
project = "kunal-scratch"
location = "us-central1"
model = "gemini-2.0-flash"

[default.llm.providers.vertex-anthropic]
type = "vertex-anthropic"
project = "kunal-scratch"
location = "global"
model = "claude-opus-4-5"

# Component assignments (omitted = uses default)
[default.llm.components]
somnia-agent = "vertex-anthropic"
sonic-agent = "vertex-gemini"
midnight-agent = "vertex-anthropic"
opencode = "vertex-anthropic"

# -----------------------------------------------------------------------------
# A2A (Agent-to-Agent) Configuration
# -----------------------------------------------------------------------------
# Controls which blockchain agents are available for A2A routing.
# The frontend agent picker defaults to this list when no selection is made.

[default.a2a]
# Explicit list of agent IDs enabled by default
# These must match agent IDs defined in [default.agents.*]
default_agents = ["somnia", "sonic", "midnight"]

# -----------------------------------------------------------------------------
# Authentication (IAP user whitelist)
# -----------------------------------------------------------------------------
# Users listed here will be granted access to opencode-web via IAP.
#
# Workflow:
#   1. Add/remove emails from allowed_users list
#   2. Run: make cloud-sync-users    # Sync IAP bindings
#   3. Changes take effect immediately
#
# NOTE: This project is deployed on an Argolis (Google internal demo) org.
# Only @kunall.altostrat.com users can access IAP-protected resources.
# External users require deployment to a non-Argolis GCP project.

[default.auth]
allowed_users = [
  "admin@kunall.altostrat.com",
]

# =============================================================================
# PRODUCTION OVERRIDES
# =============================================================================

[production.services.agent-registry]
host = "0.0.0.0"

[production.services.somnia-agent]
host = "0.0.0.0"

[production.services.sonic-agent]
host = "0.0.0.0"

[production.services.midnight-agent]
host = "0.0.0.0"

[production.services.midnight-mcp]
host = "0.0.0.0"

[production.services.evm-mcp]
host = "0.0.0.0"

[production.services.opencode-server]
host = "0.0.0.0"
port = 443

[production.services.opencode-frontend]
host = "0.0.0.0"
